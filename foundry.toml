[profile.default]
src = "solidity/contracts"
script = "solidity/scripts"
test = "solidity/tests"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
ffi = true
ast = true
build_info = true
extra_output = ["storageLayout"]
fs_permissions = [
  { access = "read", path = "./out" },
  { access = "read-write", path = "./out/build-info" }
]
