services:
  postgres:
    image: postgres:16-alpine
    container_name: blockchain-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: blockchain_platform
      POSTGRES_USER: blockchain_user
      POSTGRES_PASSWORD: blockchain_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: blockchain-platform-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
